spring:
  datasource:
    url: jdbc:h2:mem:test
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
  rabbitmq:
    host: localhost
    port: 5672
    username: guest
    password: guest
    dynamic: true
server:
  port: 8084
rabbitmq:
  exchange:
    name: order.exchange
  queue:
    name: order.queue
  routing:
    key: order.tracking
logging:
  level:
    root: INFO
    com.ecom.notification: TRACE
    io.github.resilience4j: TRACE
resilience4j:
  ratelimiter:
    instances:
      ecomRateLimiter:
        limit-refresh-period: 30s
        limit-for-period: 1
        timeout-duration: 0